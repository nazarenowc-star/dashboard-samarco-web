<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Dashboard Samarco — Versão Corrigida</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

:root{
--brand:#004c97;
--accent:#1aa06d;
--ink:#0f172a;
--muted:#6b7280;
--line:#e5e7eb;
--bg:#f7fafb;
--success:#10b981;
--warning:#f59e0b;
--danger:#ef4444;
}

html,body{
background:var(--bg);
color:var(--ink);
font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
font-size:14px;
}

.app-card{
background:#fff;
border:1px solid var(--line);
border-radius:12px;
padding:16px;
margin-bottom:16px;
}

.kpi{
font-size:28px;
font-weight:800;
}

.kpi-label{
color:var(--muted);
font-size:12px;
}

.navbar-brand{
font-weight:800;
letter-spacing:.5px;
}

.table td,.table th{
vertical-align:middle;
}

</style>
</head>

<body>

<nav class="navbar navbar-dark" style="background:var(--brand)">
<div class="container-fluid">

<span class="navbar-brand">
<i class="fa-solid fa-industry"></i>
Dashboard OMs Samarco
</span>

</div>
</nav>


<div class="container-fluid mt-3">

<div class="row">

<div class="col-md-3">
<div class="app-card">
<div class="kpi" id="kpi-total-preventiva">0</div>
<div class="kpi-label">Total Preventiva</div>
</div>
</div>

<div class="col-md-3">
<div class="app-card">
<div class="kpi" id="kpi-concluidas-preventiva">0</div>
<div class="kpi-label">Concluídas</div>
</div>
</div>

<div class="col-md-3">
<div class="app-card">
<div class="kpi" id="kpi-andamento-preventiva">0</div>
<div class="kpi-label">Em Andamento</div>
</div>
</div>

<div class="col-md-3">
<div class="app-card">
<div class="kpi" id="kpi-pendentes-preventiva">0</div>
<div class="kpi-label">Pendentes</div>
</div>
</div>

</div>


<div class="app-card">

<div class="row mb-2">

<div class="col-md-3">
<input id="filter-text-preventiva" class="form-control form-control-sm" placeholder="buscar"/>
</div>

<div class="col-md-2">
<select id="filter-area-preventiva" class="form-select form-select-sm">
<option value="">Área</option>
</select>
</div>

<div class="col-md-2">
<select id="filter-tag-preventiva" class="form-select form-select-sm">
<option value="">TAG</option>
</select>
</div>

</div>

<div class="table-responsive">

<table class="table table-sm table-striped" id="table-preventiva">
<thead>

<tr>
<th>OM</th>
<th>Área</th>
<th>TAG</th>
<th>Status</th>
<th>Descrição</th>
</tr>

</thead>

<tbody></tbody>

</table>

</div>

</div>

</div>



<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>


<script>

/* UTIL */

const Utils={
escapeHtml(str){
if(!str) return '';
return String(str)
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;");
}
};


/* CONFIG */

const CONFIG={
STORAGE_KEYS:{
PREVENTIVA:"oms_preventiva"
}
};


/* ESTADO */

const appState={
preventiva:{
data:[],
filtered:[]
}
};


/* DATA */

const DataManager={

load(type){

const key=CONFIG.STORAGE_KEYS[type.toUpperCase()];

try{
const raw=localStorage.getItem(key);
if(raw){
appState[type].data=JSON.parse(raw)||[];
}
}catch(e){}

appState[type].filtered=[...appState[type].data];

},

applyFilters(type){

const text=(document.getElementById(`filter-text-${type}`)?.value||"").toLowerCase();
const area=(document.getElementById(`filter-area-${type}`)?.value||"");
const tag=(document.getElementById(`filter-tag-${type}`)?.value||"");

let data=[...appState[type].data];

if(text){
data=data.filter(x=>JSON.stringify(x).toLowerCase().includes(text));
}

if(area){
data=data.filter(x=>x.area===area);
}

if(tag){
data=data.filter(x=>x.tag===tag);
}

appState[type].filtered=data;

UI.updateTable(type);
UI.updateKPIs(type);

}

};


/* UI */

const UI={

updateTable(type){

const tbody=document.querySelector(`#table-${type} tbody`);
if(!tbody) return;

tbody.innerHTML="";

appState[type].filtered.forEach(item=>{

const tr=document.createElement("tr");

tr.innerHTML=`

<td>${Utils.escapeHtml(item.om)}</td>
<td>${Utils.escapeHtml(item.area)}</td>
<td>${Utils.escapeHtml(item.tag)}</td>
<td>${Utils.escapeHtml(item.status)}</td>
<td>${Utils.escapeHtml(item.descricao)}</td>

`;

tbody.appendChild(tr);

});

},

updateKPIs(type){

const items=appState[type].filtered;

const total=items.length;

const concluidas=items.filter(x=>String(x.status).toLowerCase()=="concluida").length;

const andamento=items.filter(x=>String(x.status).toLowerCase()=="andamento").length;

const pendentes=total-concluidas-andamento;

document.getElementById(`kpi-total-${type}`).textContent=total;
document.getElementById(`kpi-concluidas-${type}`).textContent=concluidas;
document.getElementById(`kpi-andamento-${type}`).textContent=andamento;
document.getElementById(`kpi-pendentes-${type}`).textContent=pendentes;

},

init(){

DataManager.load("preventiva");

DataManager.applyFilters("preventiva");

CLOUD_SYNC.init().then(()=>{
CLOUD_SYNC.syncAll();
});

}

};



/* FIREBASE */

const firebaseConfig={
apiKey:"SUA_APIKEY",
authDomain:"dashboard-samarco.firebaseapp.com",
projectId:"dashboard-samarco",
storageBucket:"dashboard-samarco.appspot.com",
messagingSenderId:"000000",
appId:"000000"
};


const CLOUD_SYNC={

db:null,

async init(){

firebase.initializeApp(firebaseConfig);

this.db=firebase.firestore();

console.log("Firebase OK");

},

async loadFromCloud(type){

const snap=await this.db.collection(`dashboard_oms_${type}`)
.orderBy("createdAt","desc")
.limit(1)
.get();

if(snap.empty) return [];

const payload=snap.docs[0].data();

if(Array.isArray(payload.items)){
return payload.items;
}

return [];

},

applyRemoteState(type,items){

appState[type].data=items;

localStorage.setItem(CONFIG.STORAGE_KEYS[type.toUpperCase()],JSON.stringify(items));

DataManager.applyFilters(type);

},

async syncType(type){

const cloudItems=await this.loadFromCloud(type);

if(cloudItems.length>0){

console.log("dados nuvem",cloudItems.length);

this.applyRemoteState(type,cloudItems);

}

},

async syncAll(){

await this.syncType("preventiva");

}

};



document.addEventListener("DOMContentLoaded",UI.init);

</script>

</body>
</html>
